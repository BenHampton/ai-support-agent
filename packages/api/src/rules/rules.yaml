keywords:
  # NOTE: keyword routing is approximate. Ambiguous terms (price/cost/fee) were removed because they
  # misclassify non-billing questions (e.g. "90-day price-match guarantee") as billing. The robust
  # fix is grounding-aware routing (escalate when the KB doesn't actually answer) — see v2.md.
  billing:
    - billing
    - bill
    - invoice
    - charge
    - payment
    - subscription
    - dispute
    - refund
    - credit
    - overcharge
    - debit
  outage:
    - outage
    - down
    - offline
    - unavailable
    - not working
    - disruption
    - incident
    - latency
    - degraded
    - degradation
    - slow
    - unreachable
    - timeout
  gdpr:
    - gdpr
    - privacy
    - data retention
    - erasure
    - data protection
    - personal data
    - compliance
    - regulation
    - legal
    - dpo
    - right to
    - opt out
  refund:
    - refund
    - return
    - send back
    - money back
    - exchange
    - give back
    - cancel order

returnWindows:
  us: 30
  eu: 14

rules:
  - name: vipBillingRule
    action: escalate
    reason: "VIP customer with billing topic — immediate human escalation required"
    conditions:
      tier: vip
      keywordSet: billing
    metadata:
      priority: urgent
      tier: vip

  - name: lowConfidenceRule
    action: escalate
    reason: "Low knowledge confidence (max score: {maxScore}) — cannot reliably answer"
    conditions:
      maxScoreBelow: 0.5
    metadata:
      priority: normal

  - name: regulatedTopicRule
    action: answer
    reason: "Regulated topic detected — applying approved GDPR compliance language"
    conditions:
      keywordSet: gdpr
    metadata:
      requiresComplianceLanguage: true

  - name: knownOutageRule
    action: route
    reason: "Known ArkCloud EU outage detected — routing to incident macro"
    conditions:
      keywordSet: outage
      kbMatch:
        id: arkcloud-eu-outage
        minScore: 0.3
      incidentActive: arkcloud-eu-outage
    metadata:
      # reply text is sourced from the live incident record (arkcloud-status integration)
      macro: arkcloud-eu-outage

  - name: refundEligibilityRule
    action: answer
    reason: "Customer is {eligibleText} the {windowDays}-day return window (purchased {purchasedDaysAgo} days ago)"
    conditions:
      keywordSet: refund
      returnWindow: true

  - name: selfServeBillingRule
    action: answer
    reason: "Non-VIP billing question — directing to self-serve portal or CSM"
    conditions:
      excludeTier: vip
      keywordSet: billing
